<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>指标库</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="shell shell-viewer">
  <main class="page page-viewer">
    <header class="viewer-header panel">
      <div>
        <p class="eyebrow">Metric Library</p>
        <h1>指标体系工作台</h1>
        <p class="hero-text">正式指标按体系分组展示，右侧支持查询、查看依赖关系、证据链和值入口。</p>
      </div>
      <div class="viewer-actions">
        <a class="button-secondary" href="/">上传页</a>
        <a class="button-secondary" href="/metrics/values">指标值页</a>
        <a class="button-secondary" href="/metrics/review">候选指标审核台</a>
        <a class="button-secondary" href="/qa/workbench">校对台</a>
      </div>
    </header>

    <section class="metric-library-layout">
      <aside class="panel metric-tree-pane">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Hierarchy</p>
            <h2>指标体系导航</h2>
          </div>
          <span id="metrics-count" class="panel-tag">0 个指标</span>
        </div>
        <div id="metric-tree" class="outline-tree panel-scroll"></div>

        <section class="subpanel top-gap">
          <div class="subpanel-header"><h3>导入核心指标库</h3><span class="subtle">CSV / XLSX</span></div>
          <label class="field compact"><span>模板文件</span><input id="metric-import-file" type="file" accept=".csv,.xlsx,.xlsm"></label>
          <div class="form-actions top-gap">
            <a class="button-secondary" href="/api/v1/metrics/import/template">下载模板</a>
            <button id="metric-import-preview" class="button-secondary" type="button">预校验</button>
            <button id="metric-import-submit" class="button-primary" type="button">执行导入</button>
          </div>
          <div id="metric-import-result" class="empty-state top-gap">上传模板后，这里显示预校验或导入结果。</div>
        </section>
      </aside>

      <section class="panel metric-main-pane">
        <div class="filter-grid metric-filter-grid">
          <label class="field"><span>公司</span><select id="metric-company-filter"><option value="">全部公司</option><option value="pingan">平安</option><option value="china_life">国寿</option><option value="picc">人保</option><option value="cpic">太保</option><option value="taiping">太平</option><option value="nci">新华</option><option value="taikang">泰康</option></select></label>
          <label class="field"><span>关键词</span><input id="metric-search" type="text" placeholder="指标名 / 编码 / 分类"></label>
          <div class="form-actions metric-filter-actions"><button id="metric-refresh" class="button-primary" type="button">刷新</button><button id="metric-bootstrap" class="button-secondary" type="button">加载种子库</button></div>
        </div>

        <div id="metric-summary-cards" class="summary-cards top-gap"></div>

        <section class="subpanel top-gap">
          <div class="subpanel-header"><h3>查询结果</h3><span id="metric-detail-meta" class="subtle">未选择</span></div>
          <div class="facts-table-wrap">
            <table class="facts-table">
              <thead><tr><th>编码</th><th>指标</th><th>大类</th><th>小类</th><th>状态</th><th>值</th></tr></thead>
              <tbody id="metric-result-body"></tbody>
            </table>
          </div>
        </section>

        <section class="subpanel top-gap">
          <div class="subpanel-header"><h3>指标详情</h3><a id="metric-open-values" class="button-secondary hidden" href="#">查看指标值</a></div>
          <div id="metric-detail" class="detail-shell empty-state">从查询结果中选择一个指标后，这里展示定义、依赖关系和证据链。</div>
        </section>

        <section class="subpanel top-gap">
          <div class="subpanel-header"><h3>证据链</h3><span id="metric-evidence-meta" class="subtle">0 条</span></div>
          <div class="facts-table-wrap">
            <table class="facts-table">
              <thead><tr><th>页码</th><th>原始指标</th><th>期间</th><th>单位</th><th>文档</th><th>来源表格</th></tr></thead>
              <tbody id="metric-evidence-body"></tbody>
            </table>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="/static/metrics-library.js" defer></script>
</body>
</html>
